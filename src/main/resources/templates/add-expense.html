<div th:fragment="content" class="max-w-4xl mx-auto pt-8">
    <div class="mb-10 text-center md:text-left">
        <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">Log New Expense</h1>
        <p class="text-slate-500 mt-2 font-medium">Record maintenance, utility, or operational costs.</p>
    </div>

    <div class="bg-white rounded-[2.5rem] p-8 md:p-12 shadow-2xl shadow-slate-200 border border-slate-100">
        <form th:action="@{/manager/save-expense}" method="POST" class="space-y-8">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="group">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-3 block ml-1">Expense Name / Title</label>
                    <div class="relative flex items-center">
                        <i class="fa-solid fa-tag absolute left-5 text-slate-400 group-focus-within:text-blue-600 transition-colors"></i>
                        <input type="text" name="title" required placeholder="e.g., Water Tank Repair"
                               class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all font-bold text-slate-700">
                    </div>
                </div>

                <div class="group">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-3 block ml-1">Category</label>
                    <div class="relative flex items-center text-slate-700">
                        <i class="fa-solid fa-layer-group absolute left-5 text-slate-400"></i>
                        <select name="category" class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all font-bold appearance-none">
                            <option value="MAINTENANCE">General Maintenance</option>
                            <option value="UTILITIES">Utilities (Water/Electricity)</option>
                            <option value="FOOD">Mess/Groceries</option>
                            <option value="SALARY">Staff Salary</option>
                            <option value="OTHER">Miscellaneous</option>
                        </select>
                    </div>
                </div>

                <div class="group">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-3 block ml-1">Amount (₹)</label>
                    <div class="relative flex items-center">
                        <i class="fa-solid fa-indian-rupee-sign absolute left-5 text-slate-400 group-focus-within:text-emerald-500 transition-colors"></i>
                        <input type="number" name="amount" required placeholder="0.00"
                               class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 transition-all font-bold text-slate-700">
                    </div>
                </div>

                <div class="group">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-3 block ml-1">Transaction Date</label>
                    <div class="relative flex items-center">
                        <i class="fa-solid fa-calendar-day absolute left-5 text-slate-400"></i>
                        <input type="date" name="expenseDate" required
                               class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all font-bold text-slate-700">
                    </div>
                </div>
            </div>

            <div class="group">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-3 block ml-1">Additional Notes</label>
                <textarea name="notes" rows="3" placeholder="Add specific details about this spending..."
                          class="w-full p-5 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all font-medium text-slate-700"></textarea>
            </div>

            <div class="pt-4 flex flex-col sm:flex-row gap-4">
                <button type="submit" class="flex-1 py-5 bg-slate-900 text-white rounded-3xl font-bold hover:bg-blue-600 transition-all shadow-xl shadow-slate-200 active:scale-[0.98]">
                    SAVE EXPENSE <i class="fa-solid fa-paper-plane ml-2 text-xs"></i>
                </button>
            </div>
        </form>
    </div>
</div>

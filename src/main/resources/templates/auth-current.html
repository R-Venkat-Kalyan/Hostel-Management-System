<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Security Check | Meenakshi PG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" th:href="@{/assets/img/favicon.png}">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
<div class="w-full max-w-md bg-white p-10 rounded-[2.5rem] shadow-2xl border border-slate-100">
    <div class="text-center mb-8">
        <div class="w-16 h-16 bg-blue-600 text-white rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-xl shadow-blue-100">
            <i class="fa-solid fa-shield-halved text-2xl"></i>
        </div>
        <h1 class="text-2xl font-black text-slate-900">Identity Check</h1>
        <p class="text-slate-400 text-sm mt-2">Enter current password to continue.</p>
    </div>

    <p th:if="${error}" class="bg-rose-50 text-rose-500 p-3 rounded-xl text-xs font-bold mb-6 text-center" th:text="${error}"></p>

    <form th:action="@{/auth/verify-current}" method="POST" class="space-y-6">
        <input type="password" name="currentPassword" placeholder="Current Password" required
               class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-blue-500/10 outline-none font-bold">
        <button type="submit" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold hover:bg-blue-600 transition-all shadow-lg active:scale-95">
            VERIFY & SEND OTP
        </button>
    </form>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Room | Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .form-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md form-card rounded-3xl shadow-xl p-8">
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-12 h-12 bg-indigo-600 text-white rounded-xl mb-3 shadow-lg shadow-indigo-200">
            <i class="fa-solid fa-plus text-lg"></i>
        </div>
        <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Create New Room</h2>
        <p class="text-slate-500 text-sm mt-1">Setup unit details & pricing</p>
    </div>

    <form th:action="@{/{role}/save-room(role=${role})}" method="POST" class="space-y-4">

        <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">Room Number</label>
            <input type="text" name="roomNumber" id="roomNumber" placeholder="e.g., 201-A" oninput="detectFloor()"
                   class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all" required>
        </div>

        <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">Room Floor</label>
            <select name="roomFloor" id="roomFloor" class="w-full px-4 py-3 bg-slate-100 border border-slate-200 rounded-2xl outline-none appearance-none cursor-not-allowed" required>
                <option value="" disabled selected>Select Floor</option>
                <option value="1st Floor">1st Floor</option>
                <option value="2nd Floor">2nd Floor</option>
                <option value="3rd Floor">3rd Floor</option>
                <option value="4th Floor">4th Floor</option>
                <option value="5th Floor">5th Floor</option>
            </select>
        </div>

        <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">Room Type</label>
            <select name="roomType" id="roomType" onchange="autoFillDetails()" required
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all appearance-none cursor-pointer">
                <option value="" disabled selected>Select Variant</option>
                <option value="4 SHARING NON-AC">4 Sharing - Non AC</option>
                <option value="3 SHARING NON-AC">3 Sharing - Non AC</option>
                <option value="2 SHARING COMMON HALL">2 Sharing - Common Hall</option>
                <option value="4 SHARING AC">4 Sharing - AC</option>
                <option value="3 SHARING AC">3 Sharing - AC</option>
            </select>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">Rent Amount (₹)</label>
                <select name="rentAmount" id="rentAmount" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                    <option value="75000">75,000 (Hall)</option>
                    <option value="85000">85,000 (Non-AC)</option>
                    <option value="95000">95,000 (AC)</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">Capacity</label>
                <input type="number" name="capacity" id="capacity" placeholder="0"
                       class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" required>
            </div>
        </div>

        <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">Status</label>
            <select name="status" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                <option value="AVAILABLE">Available</option>
                <option value="MAINTENANCE">Maintenance</option>
                <option value="FULL">Full</option>
            </select>
        </div>

        <button type="submit"
                class="w-full bg-slate-900 hover:bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg flex items-center justify-center gap-3 transition-all active:scale-95 mt-4">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            <span>Save Room Details</span>
        </button>
    </form>
</div>

<script>
    function detectFloor() {
        const roomNo = document.getElementById('roomNumber').value;
        const floorSelect = document.getElementById('roomFloor');
        if (roomNo.length > 0) {
            const firstDigit = roomNo.charAt(0);
            const floorMap = { "1": "1st Floor", "2": "2nd Floor", "3": "3rd Floor", "4": "4th Floor", "5": "5th Floor" };
            if (floorMap[firstDigit]) floorSelect.value = floorMap[firstDigit];
        }
    }

    function autoFillDetails() {
        const type = document.getElementById('roomType').value;
        const rent = document.getElementById('rentAmount');
        const cap = document.getElementById('capacity');

        // Set Capacity
        if (type.includes("4 SHARING")) cap.value = 4;
        else if (type.includes("3 SHARING")) cap.value = 3;
        else if (type.includes("2 SHARING")) cap.value = 2;

        // Set Rent Based on Logic
        if (type.includes("COMMON HALL")) rent.value = "75000";
        else if (type.includes("NON-AC")) rent.value = "85000";
        else if (type.includes(" AC")) rent.value = "95000";
    }
</script>
</body>
</html>

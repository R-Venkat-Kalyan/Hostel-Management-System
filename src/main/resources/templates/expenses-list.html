<div th:fragment="content" class="max-w-7xl mx-auto pt-8">
  <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
    <div class="text-center md:text-left">
      <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">Expense Ledger</h1>
      <p class="text-slate-500 mt-2 font-medium">Audit and manage all hostel spending.</p>
    </div>
    <a th:href="@{/manager/add-expense}" class="px-8 py-4 bg-slate-900 text-white rounded-2xl font-bold shadow-xl shadow-slate-200 hover:bg-blue-600 transition-all flex items-center gap-2">
      <i class="fa-solid fa-plus text-xs"></i> NEW ENTRY
    </a>
  </div>

  <div class="bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200/60 border border-slate-100 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
        <tr class="bg-slate-50/50">
          <th class="px-8 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Date</th>
          <th class="px-8 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Expense Title</th>
          <th class="px-8 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Category</th>
          <th class="px-8 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Amount</th>
          <th class="px-8 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Actions</th>
        </tr>
        </thead>
        <tbody class="divide-y divide-slate-50">
        <tr th:each="expense : ${expenses}" class="hover:bg-slate-50/80 transition-colors group">
          <td class="px-8 py-6 font-bold text-slate-600 text-sm" th:text="${expense.expenseDate}">05 Apr 2026</td>
          <td class="px-8 py-6">
            <p class="font-black text-slate-800" th:text="${expense.title}">Water Bill</p>
            <p class="text-[10px] text-slate-400 font-medium" th:text="${expense.notes}">Monthly municipal charges</p>
          </td>
          <td class="px-8 py-6">
            <span class="px-4 py-1.5 bg-blue-50 text-blue-600 rounded-full text-[10px] font-black tracking-widest uppercase" th:text="${expense.category}">UTILITIES</span>
          </td>
          <td class="px-8 py-6 font-black text-slate-900" th:text="'₹' + ${expense.amount}">₹1,200</td>
          <td class="px-8 py-6 text-right">
            <div class="flex justify-end gap-2">
              <form th:action="@{/manager/delete-expense/{id}(id=${expense.id})}" method="POST" onsubmit="return confirm('Delete this record permanently?');">
                <button type="submit" class="w-10 h-10 bg-rose-50 text-rose-500 rounded-xl flex items-center justify-center hover:bg-rose-500 hover:text-white transition-all">
                  <i class="fa-solid fa-trash-can text-sm"></i>
                </button>
              </form>
            </div>
          </td>
        </tr>
        </tbody>
      </table>
    </div>

    <div th:if="${#lists.isEmpty(expenses)}" class="p-20 text-center">
      <div class="w-20 h-20 bg-slate-50 rounded-[2rem] flex items-center justify-center mx-auto mb-6 text-slate-200">
        <i class="fa-solid fa-folder-open text-3xl"></i>
      </div>
      <h3 class="text-xl font-bold text-slate-400 tracking-tight">No expenses recorded yet.</h3>
    </div>
  </div>
</div>

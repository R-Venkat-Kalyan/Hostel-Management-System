<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Your Feedback | Meenakshi PG</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }
        .glass-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        /* Custom Rating Animation */
        .rating-input:checked + .emoji-card {
            transform: scale(1.2);
            filter: grayscale(0);
            border-color: #3b82f6;
            background: #eff6ff;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 md:p-10">

<th:block th:if="${successMessage}">
    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl text-center max-w-sm mx-4">
            <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-check text-2xl"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-900">Awesome!</h2>
            <p class="text-slate-500 mt-2 text-sm" th:text="${successMessage}">Your feedback was submitted.</p>
            <button onclick="document.getElementById('modal').remove()" class="mt-6 w-full py-3 bg-slate-900 text-white rounded-xl font-bold hover:bg-slate-800 transition-all">Continue</button>
        </div>
    </div>
</th:block>

<div class="w-full max-w-3xl">

    <div class="mb-8 flex items-center justify-between px-2">
        <a href="javascript:history.back()" class="flex items-center gap-2 text-xs font-bold text-slate-400 hover:text-slate-900 transition-all uppercase tracking-widest">
            <i class="fa-solid fa-arrow-left-long"></i> Go Back
        </a>
        <span class="text-[10px] font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-full uppercase tracking-widest border border-blue-100">
                Meenakshi PG Portal v2.0
            </span>
    </div>

    <div class="glass-container rounded-[3rem] p-8 md:p-14 shadow-[0_32px_64px_-12px_rgba(0,0,0,0.1)] relative overflow-hidden">

        <div class="absolute top-0 right-0 w-32 h-32 bg-blue-600/5 rounded-bl-[5rem]"></div>

        <header class="text-center mb-12">
            <h1 class="text-4xl font-black text-slate-900 tracking-tight mb-3">Help Us Improve</h1>
            <p class="text-slate-500 font-medium leading-relaxed">We value your experience. Tell us what you love and what we can do better for you.</p>
        </header>

        <form th:action="@{/save-feedback}" method="POST" class="space-y-10">

            <section>
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-6 block text-center">Overall Experience</label>
                <div class="flex justify-between max-w-md mx-auto gap-2">
                    <label class="relative flex-1 text-center cursor-pointer">
                        <input type="radio" name="rating" value="1" class="hidden rating-input" required>
                        <div class="emoji-card p-4 rounded-2xl border-2 border-transparent grayscale transition-all duration-300">
                            <span class="text-3xl">😠</span>
                        </div>
                    </label>
                    <label class="relative flex-1 text-center cursor-pointer">
                        <input type="radio" name="rating" value="3" class="hidden rating-input">
                        <div class="emoji-card p-4 rounded-2xl border-2 border-transparent grayscale transition-all duration-300">
                            <span class="text-3xl">😐</span>
                        </div>
                    </label>
                    <label class="relative flex-1 text-center cursor-pointer">
                        <input type="radio" name="rating" value="5" class="hidden rating-input" checked>
                        <div class="emoji-card p-4 rounded-2xl border-2 border-transparent grayscale transition-all duration-300">
                            <span class="text-3xl">😍</span>
                        </div>
                    </label>
                </div>
            </section>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="group">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 block ml-1">Feedback Category</label>
                    <div class="relative">
                        <select name="category" required class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-blue-500/10 outline-none font-bold text-slate-700 appearance-none transition-all">
                            <option value="UI/UX">App Design & Ease of Use</option>
                            <option value="Performance">Speed & Stability</option>
                            <option value="Features">New Feature Request</option>
                            <option value="Management">Management Service</option>
                        </select>
                        <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-slate-300 pointer-events-none"></i>
                    </div>
                </div>

                <div class="group">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 block ml-1">Submitting As</label>
                    <div class="w-full p-4 bg-slate-100 border border-slate-200 rounded-2xl text-slate-400 font-black flex items-center gap-3">
                        <i class="fa-solid fa-user-shield text-blue-500"></i>
                        <span th:text="${session.user.role}">RESIDENT</span>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="group">
                    <label class="text-[10px] font-black text-emerald-500 uppercase tracking-widest mb-3 block ml-1">What's working perfectly? ✨</label>
                    <textarea name="likes" rows="3" placeholder="Tell us what you like..." required
                              class="w-full p-5 bg-slate-50 border border-slate-100 rounded-[2rem] focus:ring-4 focus:ring-emerald-500/10 outline-none font-medium text-slate-600 transition-all"></textarea>
                </div>

                <div class="group">
                    <label class="text-[10px] font-black text-rose-500 uppercase tracking-widest mb-3 block ml-1">What can we do better? 🛠️</label>
                    <textarea name="improvements" rows="3" placeholder="Suggest changes or report issues..." required
                              class="w-full p-5 bg-slate-50 border border-slate-100 rounded-[2rem] focus:ring-4 focus:ring-rose-500/10 outline-none font-medium text-slate-600 transition-all"></textarea>
                </div>
            </div>

            <button type="submit" class="w-full py-6 bg-slate-900 text-white rounded-[2.5rem] font-black hover:bg-blue-600 transition-all shadow-2xl shadow-blue-100 flex items-center justify-center gap-4 active:scale-95 group">
                SEND FEEDBACK <i class="fa-solid fa-paper-plane text-xs group-hover:translate-x-2 transition-transform"></i>
            </button>
        </form>
    </div>

    <footer class="mt-10 text-center">
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.5em]">Powered by Meenakshi Mgmt</p>
    </footer>
</div>

</body>
</html>

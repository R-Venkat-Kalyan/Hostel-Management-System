<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Ledger | Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    th, td { white-space: nowrap; }

    /* Maintaining the exact header-control height from the original template */
    .header-controls input {
        height: 2.1rem;
        font-size: .825rem;
        padding: 0 0.5rem;
        border-radius: 0.375rem;
        border: none;
        font-weight: 600;
    }
  </style>
</head>

<body>

<div th:fragment="content" class="w-full">
  <div class="bg-white shadow-xl rounded-xl overflow-hidden">

    <div class="px-4 sm:px-6 py-4 bg-slate-800 text-white rounded-t-xl flex items-center justify-between">
      <h2 class="text-2xl sm:text-3xl font-bold">
        <i class="fas fa-wallet mr-2"></i>
        Expense Ledger
      </h2>

      <div class="header-controls flex items-center gap-2">
        <form th:action="@{/manager/expenses}" method="GET" class="flex items-center">
          <input type="month" name="month" th:value="${selectedMonth}"
                 onchange="this.form.submit()"
                 class="bg-white text-slate-800">
        </form>
      </div>
    </div>

    <div class="block w-full overflow-x-auto p-4 sm:p-6">
      <table id="expenseTable" class="min-w-full divide-y divide-gray-300 bg-white rounded-lg border border-gray-300">
        <thead>
        <tr class="bg-slate-700 text-white text-sm">
          <th class="py-2 px-3 text-left">Date</th>
          <th class="py-2 px-3 text-left">Expense Title</th>
          <th class="py-2 px-3 text-left">Description</th>
          <th class="py-2 px-3 text-left">Category</th>
          <th class="py-2 px-3 text-right">Amount</th>
          <th class="py-2 px-3 text-center">Added By</th>
        </tr>
        </thead>

        <tbody class="text-sm">
        <tr th:each="exp : ${expenses}" class="hover:bg-gray-100 transition">
          <td class="py-2 px-3 border border-gray-200" th:text="${exp.expenseDate}">07-04-2026</td>
          <td class="py-2 px-3 border border-gray-200 font-medium" th:text="${exp.title}">Water Bill</td>
          <td class="py-2 px-3 border border-gray-200 italic text-slate-500" th:text="${exp.notes ?: '-'}">Monthly bill</td>
          <td class="py-2 px-3 border border-gray-200" th:text="${exp.category}">Utilities</td>
          <td class="py-2 px-3 border border-gray-200 text-right font-bold" th:text="'₹' + ${exp.amount}">₹1000</td>
          <td class="py-2 px-3 border border-gray-200 text-center" th:text="${exp.addedBy}">Bannu</td>
        </tr>
        </tbody>

        <tfoot th:if="${not #lists.isEmpty(expenses)}">
        <tr class="bg-gray-50 text-sm">
          <td class="py-2 px-3 border-t font-bold text-slate-600" colspan="4">Total Monthly Expenses</td>
          <td class="py-2 px-3 border-t text-right font-bold text-red-600">
            ₹<span th:text="${#aggregates.sum(expenses.![amount])}">0</span>
          </td>
          <td class="py-2 px-3 border-t" colspan="2"></td>
        </tr>
        </tfoot>
      </table>

      <div th:if="${#lists.isEmpty(expenses)}" class="p-10 text-center text-gray-500 italic">
        No expense records found for this period.
      </div>

    </div>
  </div>
</div>

</body>
</html>

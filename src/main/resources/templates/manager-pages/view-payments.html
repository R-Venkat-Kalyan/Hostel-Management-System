<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Ledger | Meenakshi Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        th, td { white-space: nowrap; }
        /* Custom styling for the month input to match the slate theme */
        input[type="month"]::-webkit-calendar-picker-indicator {
            filter: invert(0.5);
            cursor: pointer;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex items-start justify-center pt-8">

<div th:fragment="content" class="max-w-7xl w-full mx-auto px-4">

    <div class="flex flex-col md:flex-row justify-between items-end mb-8 gap-6">
        <div>
            <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Payment Ledger</h1>
            <p class="text-slate-500 text-sm mt-1">Full transaction history & approval status tracking</p>
        </div>

        <form th:action="@{/manager/view-payments}" method="GET" class="flex items-center gap-3 bg-white p-2 pl-4 rounded-[1.2rem] shadow-sm border border-slate-200 w-full md:w-auto">
            <div class="flex flex-col">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Select Month</span>
                <input type="month" name="month" th:value="${selectedMonth}"
                       class="bg-transparent border-none focus:ring-0 p-0 text-sm font-bold text-slate-700 outline-none">
            </div>
            <button type="submit" class="h-12 px-6 bg-slate-900 text-white rounded-xl text-xs font-bold hover:bg-emerald-600 transition-all shadow-lg shadow-slate-200 flex items-center gap-2">
                <i class="fa-solid fa-filter text-[10px]"></i> LOAD LOGS
            </button>
        </form>
    </div>

    <div class="bg-white shadow-xl shadow-slate-200/50 rounded-[1.5rem] border border-slate-200 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                <tr class="bg-slate-900 text-white">
                    <th class="py-5 px-6 text-[10px] font-bold uppercase tracking-widest">Date & Time</th>
                    <th class="py-5 px-6 text-[10px] font-bold uppercase tracking-widest">Resident</th>
                    <th class="py-5 px-6 text-[10px] font-bold uppercase tracking-widest text-center">Room</th>
                    <th class="py-5 px-6 text-[10px] font-bold uppercase tracking-widest">Mode</th>
                    <th class="py-5 px-6 text-[10px] font-bold uppercase tracking-widest">Reference #</th>
                    <th class="py-5 px-6 text-[10px] font-bold uppercase tracking-widest text-right">Amount</th>
                    <th class="py-5 px-6 text-[10px] font-bold uppercase tracking-widest text-center">Status</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-slate-100 text-sm">
                <tr th:each="p : ${payments}" class="hover:bg-slate-50/50 transition-colors group">
                    <td class="py-5 px-6 text-slate-500 font-medium"
                        th:text="${#temporals.format(p.paidDate, 'dd-MM-yyyy HH:mm')}">25-03-2026 14:30</td>
                    <td class="py-5 px-6 font-bold text-slate-700" th:text="${p.userName}">John Doe</td>
                    <td class="py-5 px-6 text-center">
                        <span class="px-2.5 py-1 bg-blue-50 text-blue-700 rounded-md font-bold text-[11px]"
                              th:text="${p.roomNumber}">101</span>
                    </td>
                    <td class="py-5 px-6">
                        <span class="px-3 py-1 bg-slate-100 text-slate-600 rounded-full text-[10px] font-bold"
                              th:text="${p.paymentMode}">UPI</span>
                    </td>
                    <td class="py-5 px-6 font-mono text-[11px] text-blue-600" th:text="${p.transactionRef}">TXN9823423</td>
                    <td class="py-5 px-6 text-right font-black text-slate-900 text-base"
                        th:text="'₹' + ${p.amount}">₹1200</td>
                    <td class="py-5 px-6 text-center">
                        <span th:if="${p.status == 'PENDING'}"
                              class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-amber-50 text-amber-600 rounded-full text-[10px] font-bold ring-1 ring-inset ring-amber-600/20">
                            <span class="w-1.5 h-1.5 rounded-full bg-amber-500 animate-pulse"></span> PENDING
                        </span>
                        <span th:if="${p.status == 'REJECTED'}"
                              class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-rose-50 text-rose-600 rounded-full text-[10px] font-bold ring-1 ring-inset ring-rose-600/20">
                            <i class="fa-solid fa-circle-xmark"></i> REJECTED
                        </span>
                        <span th:if="${p.status == 'APPROVED'}"
                              class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-emerald-50 text-emerald-600 rounded-full text-[10px] font-bold ring-1 ring-inset ring-emerald-600/20">
                            <i class="fa-solid fa-circle-check"></i> APPROVED
                        </span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${#lists.isEmpty(payments)}" class="text-center py-24 bg-white">
            <div class="w-20 h-20 bg-slate-50 text-slate-200 rounded-full flex items-center justify-center mx-auto mb-4 border border-slate-100">
                <i class="fa-solid fa-receipt text-3xl"></i>
            </div>
            <p class="text-slate-400 font-medium">No transactions found for the selected month.</p>
        </div>
    </div>
</div>

</body>
</html>

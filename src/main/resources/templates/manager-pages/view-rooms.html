<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Room Inventory | Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    th, td { white-space: nowrap; }
  </style>
</head>
<body>

<div th:fragment="content" class="w-full">
  <div class="bg-white shadow-xl rounded-xl overflow-hidden border border-slate-200">

    <div class="px-4 sm:px-6 py-5 bg-slate-800 text-white flex items-center justify-between">
      <h2 class="text-2xl font-bold flex items-center">
        <i class="fas fa-door-open mr-3 text-emerald-400"></i>
        Room Inventory
      </h2>
      <span class="text-xs font-semibold bg-slate-700 px-3 py-1 rounded-full text-slate-300 border border-slate-600 uppercase tracking-widest">
                Real-time Occupancy
            </span>
    </div>

    <div class="block w-full overflow-x-auto p-4 sm:p-6">
      <table id="roomTable" class="min-w-full divide-y divide-gray-300 bg-white rounded-lg border border-gray-300">
        <thead>
        <tr class="bg-slate-700 text-white text-sm">
          <th class="py-3 px-4 text-left">Room No.</th>
          <th class="py-3 px-4 text-left">Type</th>
          <th class="py-3 px-4 text-center">Capacity</th>
          <th class="py-3 px-4 text-center">Occupied</th>
          <th class="py-3 px-4 text-center">Available</th>
          <th class="py-3 px-4 text-right">Base Rent</th>
          <th class="py-3 px-4 text-center">Status</th>
        </tr>
        </thead>

        <tbody class="text-sm">
        <tr th:each="room : ${rooms}" class="hover:bg-slate-50 transition border-b border-gray-100">
          <td class="py-3 px-4 font-bold text-slate-900" th:text="${room.roomNumber}">101</td>
          <td class="py-3 px-4 text-slate-600" th:text="${room.roomType}">3-Sharing</td>
          <td class="py-3 px-4 text-center font-medium text-slate-500" th:text="${room.capacity}">3</td>
          <td class="py-3 px-4 text-center font-bold text-blue-600" th:text="${room.occupiedCount}">2</td>
          <td class="py-3 px-4 text-center font-bold"
              th:classappend="${(room.capacity - room.occupiedCount) > 0 ? 'text-emerald-600' : 'text-slate-400'}"
              th:text="${room.capacity - room.occupiedCount}">1</td>
          <td class="py-3 px-4 text-right font-semibold text-slate-700" th:text="'₹' + ${room.rentAmount}">₹5500</td>
          <td class="py-3 px-4 text-center">
                        <span th:if="${room.occupiedCount < room.capacity}"
                              class="px-2.5 py-1 bg-emerald-50 text-emerald-700 rounded-md text-[10px] font-bold border border-emerald-200 uppercase tracking-tighter">
                            Available
                        </span>
            <span th:if="${room.occupiedCount >= room.capacity}"
                  class="px-2.5 py-1 bg-rose-50 text-rose-700 rounded-md text-[10px] font-bold border border-rose-200 uppercase tracking-tighter">
                            Full
                        </span>
          </td>
        </tr>
        </tbody>

        <tfoot class="bg-slate-50">
        <tr class="text-sm border-t-2 border-slate-200">
          <td class="py-3 px-4 font-bold text-slate-600" colspan="3">
            Total System Capacity Metrics
          </td>
          <td class="py-3 px-4 text-center font-black text-blue-700" th:text="${totalOccupied}">
            0
          </td>
          <td class="py-3 px-4 text-center font-black text-emerald-700" th:text="${totalVacant}">
            0
          </td>
          <td class="py-3 px-4 text-right font-medium text-slate-400" colspan="2">
            Updated Live
          </td>
        </tr>
        </tfoot>
      </table>
    </div>
  </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        .wrapper { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f8fafc; padding: 40px 20px; }
        .card { max-width: 550px; margin: 0 auto; background: #ffffff; border-radius: 24px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .header { background: #0f172a; padding: 40px; text-align: center; color: #ffffff; }
        .header h1 { margin: 0; font-size: 20px; letter-spacing: 4px; font-weight: 800; }
        .body { padding: 40px; text-align: center; }
        .body h2 { color: #1e293b; font-size: 24px; margin-top: 0; }
        .body p { color: #64748b; font-size: 15px; line-height: 1.6; }
        .otp-box { margin: 35px 0; background: #f1f5f9; padding: 20px; border-radius: 16px; border: 2px dashed #cbd5e1; display: inline-block; }
        .otp-code { font-size: 38px; font-weight: 800; letter-spacing: 10px; color: #2563eb; }
        .footer { background: #f8fafc; padding: 20px; text-align: center; color: #94a3b8; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="card">
        <div class="header">
            <h1>MEENAKSHI PG</h1>
        </div>
        <div class="body">
            <h2>Security Verification</h2>
            <p>Hello <strong>[[name]]</strong>,</p>
            <p>We received a request to update your account password. Use the verification code below to proceed.</p>

            <div class="otp-box">
                <span class="otp-code">[[otp]]</span>
            </div>

            <p style="font-size: 12px;">This code will expire in 10 minutes. If you did not request this, please ignore this email.</p>
        </div>
        <div class="footer">
            Secured by Meenakshi Management Portal
        </div>
    </div>
</div>
</body>
</html>

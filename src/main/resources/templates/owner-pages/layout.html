<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Management Dashboard</title>
    <link rel="icon" type="image/png" th:href="@{/assets/img/favicon.png}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet"/>

    <style>
        .brand-text {
            font-family: 'Poppins', sans-serif;
            color: #88f572;
            letter-spacing: .5px;
        }

        #mobile-sidebar {
            transition: transform 0.3s ease-in-out;
        }
    </style>
    <script>
        let timeout;
        function resetTimer() {
            clearTimeout(timeout);
            // 5 minutes = 300,000 milliseconds
            timeout = setTimeout(() => {
                alert("Session expired due to inactivity.");
                window.location.href = "/sign-out";
            }, 300000);
        }

        // Reset timer on any user interaction
        window.onload = resetTimer;
        window.onmousemove = resetTimer;
        window.onmousedown = resetTimer;
        window.ontouchstart = resetTimer;
        window.onclick = resetTimer;
        window.onkeydown = resetTimer;
    </script>
</head>

<body class="flex flex-col w-screen h-screen bg-white overflow-x-hidden">

<div id="alertModal" class="fixed inset-0 z-[100] flex items-center justify-center hidden p-4 bg-black/50">
    <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-6 transform transition-all scale-95 opacity-0"
         id="modalContent">
        <div class="text-center">
            <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-green-100 mb-4">
                <i class="fas fa-check text-green-600 text-xl"></i>
            </div>
            <h3 class="text-lg font-bold text-gray-900 mb-2">Success!</h3>
            <p class="text-sm text-gray-500 mb-6" id="alertMessageText"></p>
            <button onclick="closeAlert()"
                    class="w-full py-2 px-4 bg-gray-900 text-white rounded-xl font-semibold hover:bg-gray-800 transition-colors">
                Continue
            </button>
        </div>
    </div>
</div>

<th:block th:if="${successMessage}">
    <script th:inline="javascript">
        window.onload = function () {
            showAlert(/*[[${successMessage}]]*/ 'Action completed successfully');
        };
    </script>
</th:block>

<nav class="bg-gray-900 fixed w-full z-30 top-0 start-0 border-b border-gray-700">
    <div class="flex flex-wrap items-center justify-between p-4">

        <div class="flex items-center space-x-3">
            <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white md:hidden focus:outline-none">
                <i class="fas fa-bars text-xl"></i>
            </button>

            <a href="/" class="flex items-center space-x-2 text-white no-underline">
                <h1 class="text-2xl brand-text">Meenakshi</h1>
                <span class="sr-only">Home</span>
            </a>
        </div>

        <div class="flex md:order-2">
            <form th:action="@{/sign-out}" method="post">
                <button type="submit"
                        class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none font-medium rounded-lg text-sm px-4 py-2 text-center">
                    Logout
                </button>
                <input type="hidden" name="_csrf" th:value="${_csrf.token}" th:if="${_csrf}"/>
            </form>
        </div>
    </div>
</nav>

<div class="flex flex-row mt-16 h-full">

    <aside id="mobile-sidebar" class="fixed top-16 left-0 z-20 w-48 bg-gray-900 text-gray-400 h-[calc(100vh-4rem)]
               transform -translate-x-full md:translate-x-0 md:flex flex-col">
        <div class="w-full px-2">
            <div class="flex flex-col items-center w-full mt-3">
                <a class="flex items-center w-full h-12 px-3 mt-2 rounded hover:bg-gray-700 hover:text-gray-300"
                   href="/owner/dashboard">
                    <svg class="w-6 h-6 stroke-current" xmlns="http://www.w3.org/2000/svg" fill="none"
                         viewBox="0 0 24 24"
                         stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                    </svg>
                    <span class="ml-2 text-sm font-medium">Dashboard</span>
                </a>

                <a class="flex items-center w-full h-12 px-3 mt-2 rounded hover:bg-gray-700 hover:text-gray-300"
                   href="/owner/add-staff">
                    <i class="fas fa-user-shield w-6"></i>
                    <span class="ml-2 text-sm font-medium">Add New Staff</span>
                </a>

                <a class="flex items-center w-full h-12 px-3 mt-2 rounded hover:bg-gray-700 hover:text-gray-300"
                   href="/owner/view-staff">
                    <i class="fas fa-users-cog w-6"></i>
                    <span class="ml-2 text-sm font-medium">View Staff</span>
                </a>

                <a class="flex items-center w-full h-12 px-3 mt-2 rounded hover:bg-gray-700 hover:text-gray-300"
                   href="/owner/add-room">
                    <i class="fas fa-plus-circle w-6"></i>
                    <span class="ml-2 text-sm font-medium">Add New Room</span>
                </a>

                <a class="flex items-center w-full h-12 px-3 mt-2 rounded hover:bg-gray-700 hover:text-gray-300"
                   href="/owner/add-resident">
                    <i class="fas fa-user-plus w-6"></i>
                    <span class="ml-2 text-sm font-medium">Add Resident</span>
                </a>

                <a class="flex items-center w-full h-12 px-3 mt-2 rounded hover:bg-gray-700 hover:text-gray-300"
                   href="/owner/assign-room">
                    <i class="fa-solid fa-key w-6"></i>
                    <span class="ml-2 text-sm font-medium">Assign Room</span>
                </a>

                <div class="fixed bottom-4 left-2 w-44 z-30 pointer-events-auto">
                    <a class="relative flex items-center w-full h-12 px-3 rounded-lg bg-gradient-to-r from-blue-500 to-green-500 text-white font-bold"
                       href="/feedback">
                        <i class="fa-solid fa-comment w-6 h-6"></i>
                        <span class="ml-2 text-sm font-medium">Feedback</span>
                        <span class="absolute top-0 right-0 mt-1 mr-1 bg-red-500 text-white text-xs font-bold px-2 py-1 rounded-full animate-bounce">New!</span>
                    </a>
                </div>
            </div>
        </div>
    </aside>

    <div id="sidebar-overlay" onclick="toggleSidebar()"
         class="fixed inset-0 bg-black opacity-50 z-10 hidden md:hidden"></div>

    <main class="flex-grow md:ml-48 p-4 bg-white min-h-[calc(100vh-4rem)] flex items-start justify-center pt-8 overflow-x-hidden">
        <div th:replace="~{${mainContent}}" class="w-full max-w-full overflow-hidden">
        </div>
    </main>
</div>

<script>
    function toggleSidebar() {
        const sidebar = document.getElementById('mobile-sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        sidebar.classList.toggle('-translate-x-full');
        overlay.classList.toggle('hidden');
    }

    // Modal Alert Logic
    function showAlert(msg) {
        document.getElementById('alertMessageText').innerText = msg;
        const modal = document.getElementById('alertModal');
        const content = document.getElementById('modalContent');
        modal.classList.remove('hidden');
        setTimeout(() => {
            content.classList.remove('scale-95', 'opacity-0');
            content.classList.add('scale-100', 'opacity-100');
        }, 10);
    }

    function closeAlert() {
        const content = document.getElementById('modalContent');
        content.classList.add('scale-95', 'opacity-0');
        setTimeout(() => {
            document.getElementById('alertModal').classList.add('hidden');
        }, 200);
    }
</script>

</body>
</html>

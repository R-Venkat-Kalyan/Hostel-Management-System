<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pending Approvals | Meenakshi Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    th, td { white-space: nowrap; }
  </style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center">

<div class="max-w-7xl w-full mx-auto py-8 px-4">

  <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
    <div>
      <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Payment Approvals</h1>
      <p class="text-slate-500 text-sm mt-1">Review and verify resident transactions</p>
    </div>
    <div class="px-4 py-2 bg-amber-100 text-amber-700 rounded-2xl text-xs font-bold border border-amber-200 uppercase tracking-widest">
      <i class="fa-solid fa-shield-halved mr-2"></i> Owner Authorization Required
    </div>
  </div>

  <div class="bg-white shadow-xl shadow-slate-200/50 rounded-[1.5rem] border border-slate-200 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left">
        <thead>
        <tr class="bg-slate-900 text-white">
          <th class="py-4 px-6 text-xs font-bold uppercase tracking-widest">Date</th>
          <th class="py-4 px-6 text-xs font-bold uppercase tracking-widest">Resident</th>
          <th class="py-4 px-6 text-xs font-bold uppercase tracking-widest text-center">Room</th>
          <th class="py-4 px-6 text-xs font-bold uppercase tracking-widest">Mode</th>
          <th class="py-4 px-6 text-xs font-bold uppercase tracking-widest">Reference #</th>
          <th class="py-4 px-6 text-xs font-bold uppercase tracking-widest text-right">Current Due</th>
          <th class="py-4 px-6 text-xs font-bold uppercase tracking-widest text-right">Amount Paid</th>
          <th class="py-4 px-6 text-xs font-bold uppercase tracking-widest text-center">Actions</th>
        </tr>
        </thead>
        <tbody class="divide-y divide-slate-100 text-sm">
        <tr th:each="pay : ${pendingPayments}" class="hover:bg-slate-50/50 transition-colors group">
          <td class="py-4 px-6 text-slate-500" th:text="${#temporals.format(pay.paidDate, 'dd-MM-yyyy HH:mm')}">25-03-2026</td>
          <td class="py-4 px-6 font-semibold text-slate-700" th:text="${pay.userName}">John Doe</td>
          <td class="py-4 px-6 text-center">
            <span class="px-2 py-1 bg-blue-50 text-blue-700 rounded-md font-bold text-xs" th:text="${pay.roomNumber}">101</span>
          </td>
          <td class="py-4 px-6">
            <span class="px-3 py-1 bg-slate-100 text-slate-600 rounded-full text-[10px] font-bold" th:text="${pay.paymentMode}">UPI</span>
          </td>
          <td class="py-4 px-6 font-mono text-xs text-blue-600" th:text="${pay.transactionRef}">TXN9823423</td>
          <td class="py-4 px-6 text-right font-bold text-rose-500" th:text="'₹' + ${pay.dueAmount}">₹4500</td>
          <td class="py-4 px-6 text-right font-bold text-slate-900" th:text="'₹' + ${pay.amount}">₹1200</td>
          <td class="py-4 px-6 text-center">
            <div class="flex justify-center gap-2">
              <form th:action="@{/approve-payment/{id}(id=${pay.id})}" method="POST">
                <input type="hidden" name="action" value="APPROVE">
                <button type="submit" class="p-2 bg-emerald-500 text-white rounded-lg hover:bg-emerald-600 transition-all shadow-md shadow-emerald-100">
                  <i class="fa-solid fa-check"></i>
                </button>
              </form>
              <form th:action="@{/manager/approve-payment/{id}(id=${pay.id})}" method="POST">
                <input type="hidden" name="action" value="REJECT">
                <button type="submit" class="p-2 bg-rose-500 text-white rounded-lg hover:bg-rose-600 transition-all shadow-md shadow-rose-100">
                  <i class="fa-solid fa-xmark"></i>
                </button>
              </form>
            </div>
          </td>
        </tr>
        </tbody>
      </table>
    </div>

    <div th:if="${#lists.isEmpty(pendingPayments)}" class="text-center py-20 bg-white">
      <div class="w-16 h-16 bg-slate-50 text-slate-200 rounded-full flex items-center justify-center mx-auto mb-4">
        <i class="fa-solid fa-stamp text-3xl"></i>
      </div>
      <p class="text-slate-400 font-medium">No pending payments requiring approval.</p>
    </div>
  </div>
</div>

</body>
</html>

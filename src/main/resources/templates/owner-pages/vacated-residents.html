<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vacated Residents | Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        th, td { white-space: nowrap; }
    </style>
</head>

<body class="bg-slate-50">

<div th:fragment="content" class="w-full">
    <div class="bg-white shadow-xl rounded-xl overflow-hidden border border-gray-300">

        <div class="px-4 sm:px-6 py-4 bg-slate-800 text-white rounded-t-xl flex items-center justify-between">
            <h2 class="text-2xl sm:text-3xl font-bold">
                <i class="fas fa-box-archive mr-2 text-amber-400"></i>
                Vacated Student Archive
            </h2>
        </div>

        <div class="block w-full overflow-x-auto p-4 sm:p-6">
            <table id="vacatedTable" class="min-w-full divide-y divide-gray-300 bg-white rounded-lg border border-gray-300">
                <thead>
                <tr class="bg-slate-700 text-white text-sm">
                    <th class="py-3 px-4 text-left">Name</th>
                    <th class="py-3 px-4 text-left">University ID</th>
                    <th class="py-3 px-4 text-left">Last Room</th>
                    <th class="py-3 px-4 text-center">Joined Date</th>
                    <th class="py-3 px-4 text-center">Vacated Date</th>
                    <th class="py-3 px-4 text-right">Total Stay Revenue</th>
                    <th class="py-3 px-4 text-left">Reason</th>
                </tr>
                </thead>

                <tbody class="text-sm">
                <tr th:each="res : ${vacatedResidents}" class="hover:bg-slate-50 transition-colors">
                    <td class="py-3 px-4 border border-gray-200 font-semibold text-slate-700" th:text="${res.name}">John Doe</td>
                    <td class="py-3 px-4 border border-gray-200 text-slate-600" th:text="${res.universityId}">U2024001</td>
                    <td class="py-3 px-4 border border-gray-200 font-bold text-slate-500" th:text="${res.roomNumber}">101</td>
                    <td class="py-3 px-4 border border-gray-200 text-center text-slate-500"
                        th:text="${res.joinedDate != null ? #temporals.format(res.joinedDate, 'dd-MM-yyyy') : '-'}">01-01-2026</td>
                    <td class="py-3 px-4 border border-gray-200 text-center font-medium text-rose-600"
                        th:text="${res.vacatedDate != null ? #temporals.format(res.vacatedDate, 'dd-MM-yyyy') : '-'}">18-04-2026</td>
                    <td class="py-3 px-4 border border-gray-200 text-right font-bold text-emerald-600"
                        th:text="'₹' + ${res.totalPaidDuringStay}">₹5000</td>
                    <td class="py-3 px-4 border border-gray-200 text-left italic text-slate-400 text-xs" th:text="${res.reason}">PERMANENT_EXIT</td>
                </tr>
                <tr th:if="${#lists.isEmpty(vacatedResidents)}">
                    <td colspan="7" class="py-10 text-center text-slate-400 italic">No vacated resident records found.</td>
                </tr>
                </tbody>

                <tfoot>
                <tr class="bg-slate-50 text-sm">
                    <td class="py-3 px-4 border-t font-bold text-slate-600" colspan="5">Total Historical Revenue from Archive</td>
                    <td class="py-3 px-4 border-t text-right font-bold text-emerald-600" th:text="'₹' + ${totalRevenue}">0</td>
                    <td class="py-3 px-4 border-t"></td>
                </tr>
                </tfoot>
            </table>
        </div>
    </div>
</div>

</body>
</html>

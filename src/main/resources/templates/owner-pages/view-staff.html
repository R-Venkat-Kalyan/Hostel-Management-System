<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Directory | Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        th, td { white-space: nowrap; }
        [title] { position: relative; }
    </style>
</head>

<body class="bg-slate-50">

<div th:fragment="content" class="w-full">
    <div class="bg-white shadow-xl rounded-xl overflow-hidden border border-gray-300">

        <div class="px-4 sm:px-6 py-4 bg-slate-800 text-white rounded-t-xl flex items-center justify-between">
            <h2 class="text-2xl sm:text-3xl font-bold">
                <i class="fas fa-user-shield mr-2 text-blue-400"></i>
                Staff Administration
            </h2>
            <a th:href="@{/owner/add-staff}"
               class="px-4 py-2 bg-white text-slate-800 hover:bg-gray-100 text-xs font-bold rounded-lg transition-colors">
                <i class="fas fa-plus mr-1"></i> ADD NEW STAFF
            </a>
        </div>

        <div class="block w-full overflow-x-auto p-4 sm:p-6">
            <table id="staffTable" class="min-w-full divide-y divide-gray-300 bg-white rounded-lg border border-gray-300">
                <thead>
                <tr class="bg-slate-700 text-white text-sm">
                    <th class="py-3 px-4 text-left">Full Name</th>
                    <th class="py-3 px-4 text-left">Role</th>
                    <th class="py-3 px-4 text-left">Security PIN</th>
                    <th class="py-3 px-4 text-left">Email Address</th>
                    <th class="py-3 px-4 text-left">Phone Number</th>
                    <th class="py-3 px-4 text-center">Actions</th>
                </tr>
                </thead>

                <tbody class="text-sm">
                <tr th:each="staff : ${staffList}" class="hover:bg-slate-50 transition-colors">
                    <td class="py-3 px-4 border border-gray-200 font-semibold text-slate-700" th:text="${staff.fullName}">Admin Name</td>

                    <td class="py-3 px-4 border border-gray-200">
                        <span class="px-3 py-1 rounded-full text-[10px] font-black tracking-widest uppercase"
                              th:classappend="${staff.role == 'OWNER' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'}"
                              th:text="${staff.role}">MANAGER</span>
                    </td>

                    <td class="py-3 px-4 border border-gray-200 font-mono text-rose-600 font-bold" th:text="${staff.universityId}">PIN-123</td>

                    <td class="py-3 px-4 border border-gray-200 text-slate-600 italic" th:text="${staff.email}">email@hms.com</td>

                    <td class="py-3 px-4 border border-gray-200 text-slate-700 font-medium" th:text="${staff.phone}">+91 00000 00000</td>

                    <td class="py-3 px-4 border border-gray-200">
                        <div class="flex items-center justify-center gap-5">

                            <a th:href="@{/owner/edit-staff/{id}(id=${staff.id})}"
                               title="Edit Staff Member"
                               class="text-amber-500 hover:text-amber-700 transition-transform hover:scale-125">
                                <i class="fas fa-user-pen fa-lg"></i>
                            </a>

                            <form th:action="@{/owner/delete-staff/{id}(id=${staff.id})}"
                                  method="POST"
                                  onsubmit="return confirm('Permanently remove this staff member? This will revoke their access immediately.');"
                                  class="inline">
                                <button type="submit" title="Delete Staff Account"
                                        class="text-rose-500 hover:text-rose-700 transition-transform hover:scale-125">
                                    <i class="fas fa-trash-can fa-lg"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(staffList)}">
                    <td colspan="6" class="py-10 text-center text-slate-400 italic">No staff members found.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>

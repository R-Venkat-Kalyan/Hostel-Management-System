<div th:fragment="content" class="w-full max-w-4xl mx-auto px-4 py-8">
  <div class="grid grid-cols-1 md:grid-cols-3 gap-8">

    <div class="md:col-span-2 bg-slate-900 rounded-[3rem] p-10 text-white shadow-2xl relative overflow-hidden">
      <i class="fa-solid fa-bed absolute -right-10 -bottom-10 text-[12rem] text-white opacity-5"></i>

      <div class="relative z-10">
        <div class="flex items-center gap-4 mb-8">
          <div class="w-14 h-14 bg-white/10 rounded-2xl flex items-center justify-center backdrop-blur-xl border border-white/20">
            <i class="fa-solid fa-key text-blue-400"></i>
          </div>
          <h2 class="text-3xl font-black">Room <span th:text="${room.roomNumber}">101</span></h2>
        </div>

        <div class="grid grid-cols-2 gap-10">
          <div>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Room Category</p>
            <p class="text-lg font-bold" th:text="${room.roomType}">3-Sharing AC</p>
          </div>
          <div>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Allotted Floor</p>
            <p class="text-lg font-bold">1st Floor</p>
          </div>
        </div>
      </div>
    </div>

    <div class="bg-white p-8 rounded-[3rem] border border-slate-100 shadow-xl shadow-slate-200/50">
      <h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-6">Room Features</h3>
      <ul class="space-y-4">
        <li class="flex items-center gap-3 text-sm font-bold text-slate-700">
          <i class="fa-solid fa-wifi text-blue-500"></i> High-Speed WiFi
        </li>
        <li class="flex items-center gap-3 text-sm font-bold text-slate-700">
          <i class="fa-solid fa-fan text-blue-500"></i> Central Air
        </li>
        <li class="flex items-center gap-3 text-sm font-bold text-slate-700">
          <i class="fa-solid fa-plug text-blue-500"></i> Power Backup
        </li>
      </ul>
    </div>
  </div>
</div>

<div th:fragment="content" class="w-full max-w-4xl mx-auto px-4 py-8">
  <div class="grid grid-cols-1 md:grid-cols-3 gap-8">

    <div class="md:col-span-2 bg-slate-900 rounded-[3rem] p-10 text-white shadow-2xl relative overflow-hidden group">
      <i class="fa-solid fa-bed absolute -right-10 -bottom-10 text-[12rem] text-white opacity-5"></i>

      <div class="relative z-10">
        <div class="flex items-center gap-4 mb-8">
          <div class="w-14 h-14 bg-white/10 rounded-2xl flex items-center justify-center backdrop-blur-xl border border-white/20 shadow-inner">
            <i class="fa-solid fa-key text-blue-400"></i>
          </div>
          <h2 class="text-3xl font-black">Room <span th:text="${room?.roomNumber ?: '101'}">101</span></h2>
        </div>

        <div class="grid grid-cols-2 gap-10">
          <div>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Room Category</p>
            <p class="text-lg font-bold" th:text="${room?.roomType ?: '3-Sharing AC'}">3-Sharing AC</p>
          </div>
          <div>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Allotted Floor</p>
            <p class="text-lg font-bold" th:text="${room?.floor ?: '1st Floor'}">1st Floor</p>
          </div>
        </div>
      </div>
    </div>

    <div class="bg-white p-8 rounded-[3rem] border border-slate-100 shadow-xl shadow-slate-200/50">
      <h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-6 px-1">Room Features</h3>
      <ul class="space-y-4">
        <li class="flex items-center gap-4 p-3 rounded-2xl hover:bg-slate-50 transition-colors group">
          <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center group-hover:bg-blue-600 group-hover:text-white transition-all">
            <i class="fa-solid fa-wifi"></i>
          </div>
          <span class="text-sm font-bold text-slate-700">High-Speed WiFi</span>
        </li>
        <li class="flex items-center gap-4 p-3 rounded-2xl hover:bg-slate-50 transition-colors group">
          <div class="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center group-hover:bg-emerald-600 group-hover:text-white transition-all">
            <i class="fa-solid fa-fan"></i>
          </div>
          <span class="text-sm font-bold text-slate-700">Central Air</span>
        </li>
        <li class="flex items-center gap-4 p-3 rounded-2xl hover:bg-slate-50 transition-colors group">
          <div class="w-10 h-10 bg-amber-50 text-amber-600 rounded-xl flex items-center justify-center group-hover:bg-amber-600 group-hover:text-white transition-all">
            <i class="fa-solid fa-plug"></i>
          </div>
          <span class="text-sm font-bold text-slate-700">Power Backup</span>
        </li>
      </ul>
    </div>
  </div>
</div>

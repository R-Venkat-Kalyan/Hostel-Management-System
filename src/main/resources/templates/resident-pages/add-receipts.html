<div th:fragment="content" class="max-w-2xl mx-auto px-4 py-8">
  <div class="bg-white p-8 rounded-[2.5rem] shadow-xl shadow-slate-200/60 border border-slate-100">
    <div class="mb-10 text-center">
      <div class="w-16 h-16 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-sm">
        <i class="fa-solid fa-file-circle-plus text-2xl"></i>
      </div>
      <h1 class="text-3xl font-black text-slate-900 tracking-tight">Upload Receipt</h1>
      <p class="text-slate-500 text-sm mt-2">Log your payment manually for your personal records.</p>
    </div>

    <form action="#" method="POST" enctype="multipart/form-data" class="space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="group">
          <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block ml-1">Payment Date</label>
          <input type="date" name="paymentDate" required
                 class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 outline-none transition-all font-bold text-slate-700">
        </div>
        <div class="group">
          <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block ml-1">Amount Paid (₹)</label>
          <input type="number" name="amount" placeholder="0.00" required
                 class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 outline-none transition-all font-bold text-slate-700">
        </div>
      </div>

      <div class="group">
        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block ml-1">Remaining Due (Optional)</label>
        <input type="number" name="dueAmount" placeholder="Your estimated pending balance"
               class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 outline-none transition-all font-bold text-slate-700">
      </div>

      <div class="group">
        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block ml-1">Upload Receipt Image</label>
        <div class="relative flex items-center justify-center w-full">
          <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-slate-200 border-dashed rounded-[2rem] cursor-pointer bg-slate-50 hover:bg-slate-100 transition-all">
            <div class="flex flex-col items-center justify-center pt-5 pb-6">
              <i class="fa-solid fa-cloud-arrow-up text-slate-400 mb-2"></i>
              <p class="text-xs text-slate-500 font-medium">Click to upload (JPG, PNG)</p>
            </div>
            <input type="file" name="receiptImage" class="hidden" accept="image/*" required />
          </label>
        </div>
      </div>

      <button type="submit" class="w-full py-5 bg-slate-900 text-white rounded-[2rem] font-bold hover:bg-emerald-600 transition-all shadow-xl flex items-center justify-center gap-3 active:scale-95 mt-4">
        <i class="fa-solid fa-check-double"></i> SAVE RECEIPT
      </button>
    </form>
  </div>
</div>

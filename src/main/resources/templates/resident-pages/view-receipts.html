<div th:fragment="content" class="w-full max-w-6xl mx-auto px-4 py-8">

    <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
        <div>
            <h1 class="text-4xl font-black text-slate-900 tracking-tight">Receipt Vault</h1>
            <p class="text-slate-500 text-sm font-medium uppercase tracking-widest mt-1">Your Personal Payment History</p>
        </div>
        <a th:href="@{/resident/add-fee-receipt}" class="group px-8 py-4 bg-slate-900 text-white rounded-[2rem] font-bold text-xs shadow-2xl hover:bg-blue-600 transition-all flex items-center gap-3">
            <i class="fa-solid fa-plus group-hover:rotate-90 transition-transform"></i> UPLOAD NEW
        </a>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">

        <div th:each="r : ${receipts}" class="bg-white p-5 rounded-[2.5rem] border border-slate-100 shadow-xl shadow-slate-200/50 flex flex-col group hover:shadow-2xl transition-all">

            <div class="relative w-full h-56 rounded-[2rem] overflow-hidden mb-6 bg-slate-50 border border-slate-100">
                <img th:src="${r.receiptUrl}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" alt="Receipt">
                <div class="absolute inset-0 bg-gradient-to-t from-slate-900/40 to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end justify-center pb-6">
                    <a th:href="${r.receiptUrl}" target="_blank" class="px-4 py-2 bg-white text-slate-900 rounded-full font-bold text-[10px] uppercase tracking-widest shadow-xl">
                        <i class="fa-solid fa-expand mr-1"></i> View Full
                    </a>
                </div>
            </div>

            <div class="px-2 pb-2">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Amount Paid</p>
                        <h3 class="text-2xl font-black text-slate-800" th:text="'₹' + ${r.amount}">₹5,500</h3>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Date</p>
                        <p class="text-xs font-bold text-slate-600" th:text="${#temporals.format(r.paymentDate, 'dd MMM yyyy')}">28 Mar 2026</p>
                    </div>
                </div>

                <a th:href="${r.receiptUrl}" download class="w-full py-3 bg-slate-50 text-slate-400 rounded-2xl font-bold text-[10px] uppercase tracking-[0.2em] hover:bg-blue-50 hover:text-blue-600 transition-colors flex items-center justify-center gap-2">
                    <i class="fa-solid fa-cloud-arrow-down"></i> Download Proof
                </a>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(receipts)}" class="col-span-full py-20 text-center bg-white rounded-[3rem] border border-dashed border-slate-200">
            <div class="w-20 h-20 bg-slate-50 text-slate-200 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-folder-open text-4xl"></i>
            </div>
            <h2 class="text-xl font-black text-slate-900">No Receipts Found</h2>
            <p class="text-slate-400 text-sm mt-2">Start by uploading your first payment proof today.</p>
        </div>
    </div>
</div>

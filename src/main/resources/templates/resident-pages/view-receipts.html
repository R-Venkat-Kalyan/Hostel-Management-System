<div th:fragment="content" class="w-full max-w-6xl mx-auto px-4 py-8">
    <div class="mb-10 flex flex-col md:flex-row justify-between items-center gap-4">
        <div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tight">Your Receipts</h1>
            <p class="text-slate-500 text-sm">Stored history of your uploaded payment proof.</p>
        </div>
        <a href="/add-receipt" class="px-6 py-3 bg-blue-600 text-white rounded-2xl font-bold text-sm shadow-lg shadow-blue-100 flex items-center gap-2 hover:bg-blue-700 transition-all">
            <i class="fa-solid fa-plus"></i> NEW UPLOAD
        </a>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <div th:each="receipt : ${receipts}" class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-xl shadow-slate-200/50 flex flex-col items-center text-center">
            <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center mb-4">
                <i class="fa-solid fa-receipt"></i>
            </div>
            <h3 class="text-lg font-black text-slate-800" th:text="'₹' + ${receipt.amount}">₹5000</h3>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1" th:text="${receipt.paymentDate}">24 MAR 2026</p>

            <div class="mt-6 pt-4 border-t border-slate-50 w-full flex items-center justify-center gap-4">
                <a th:href="${receipt.imageUrl}" download class="text-xs font-bold text-blue-500 hover:text-blue-700 transition-colors flex items-center gap-2">
                    <i class="fa-solid fa-download"></i> DOWNLOAD
                </a>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(receipts)}" class="py-20 text-center">
        <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4 border border-slate-100">
            <i class="fa-solid fa-folder-open text-slate-200 text-3xl"></i>
        </div>
        <p class="text-slate-400 font-medium">No receipts uploaded yet.</p>
    </div>
</div>

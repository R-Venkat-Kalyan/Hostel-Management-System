<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Verification | Meenakshi Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" th:href="@{/assets/img/favicon.png}">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .security-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        /* Adjusting tracking for potentially 12 characters */
        .pin-input {
            letter-spacing: 0.15em;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

<div class="max-w-md w-full">
    <div class="text-center mb-10">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-white text-blue-600 rounded-3xl mb-5 shadow-xl shadow-blue-50 border border-blue-100">
            <i class="fa-solid fa-user-shield text-3xl"></i>
        </div>
        <h1 class="text-3xl font-black text-slate-900 tracking-tight">Security Verification</h1>
        <p class="text-slate-500 mt-2 font-medium">Enter your specialized Security PIN to unlock the dashboard.</p>
    </div>

    <div class="security-card p-10 rounded-[2.5rem] shadow-2xl shadow-blue-100/70 border border-slate-100">
        <form th:action="@{/auth/verify-pin}" method="POST" class="space-y-8">
            <div class="group">
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-4 text-center group-focus-within:text-blue-600 transition-colors">Enter Security Code</label>
                <div class="relative">
                    <i class="fa-solid fa-key absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>

                    <input type="password" id="pinInput" name="pin" maxlength="12" autofocus required
                           placeholder="••••••••"
                           class="w-full pl-14 pr-14 py-5 bg-slate-50 border border-slate-100 rounded-2xl text-center text-2xl font-black text-slate-800 outline-none transition-all pin-input focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 focus:bg-white">

                    <button type="button" onclick="togglePinVisibility()" class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-blue-600 transition-colors">
                        <i id="toggleIcon" class="fa-solid fa-eye-slash"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="w-full py-5 bg-blue-600 hover:bg-slate-900 text-white rounded-3xl font-black transition-all shadow-xl shadow-blue-100 active:scale-[0.98] tracking-widest text-xs">
                ACCESS DASHBOARD <i class="fa-solid fa-arrow-right ml-2 text-[10px]"></i>
            </button>
        </form>

        <div class="mt-8 text-center border-t border-slate-100 pt-6">
            <a th:href="@{/sign-in}" class="text-[10px] font-bold text-slate-400 hover:text-blue-600 transition-colors uppercase tracking-widest">
                <i class="fa-solid fa-arrow-left mr-1"></i> Terminate Session
            </a>
        </div>
    </div>
</div>

<script>
    function togglePinVisibility() {
        const pinInput = document.getElementById('pinInput');
        const toggleIcon = document.getElementById('toggleIcon');

        if (pinInput.type === 'password') {
            pinInput.type = 'text';
            toggleIcon.classList.remove('fa-eye-slash');
            toggleIcon.classList.add('fa-eye');
        } else {
            pinInput.type = 'password';
            toggleIcon.classList.remove('fa-eye');
            toggleIcon.classList.add('fa-eye-slash');
        }
    }
</script>

</body>
</html>

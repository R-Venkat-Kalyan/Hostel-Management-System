<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Meenakshi Management</title>
    <link rel="icon" type="image/png" th:href="@{/assets/img/favicon.png}">
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"

          rel="stylesheet">

    <style>

        body { font-family: 'Plus Jakarta Sans', sans-serif; }

        .glass-effect {

        background: rgba(255, 255, 255, 0.95);

        backdrop-filter: blur(10px);

        border: 1px solid rgba(255, 255, 255, 0.2);

        }

        .input-focus:focus-within {

        ring: 2px;

        ring-color: #3b82f6;

        border-color: #3b82f6;

        }

    </style>

</head>

<body class="bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-6">


<div id="alertModal" class="fixed inset-0 z-[100] flex items-center justify-center hidden p-4 bg-black/50">

    <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-6 transform transition-all scale-95 opacity-0"

         id="modalContent">

        <div class="text-center">

            <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-green-100 mb-4">

                <i class="fas fa-check text-green-600 text-xl"></i>

            </div>

            <h3 class="text-lg font-bold text-gray-900 mb-2">Response !!</h3>

            <p class="text-sm text-gray-500 mb-6" id="alertMessageText"></p>

            <button onclick="closeAlert()"

                    class="w-full py-2 px-4 bg-gray-900 text-white rounded-xl font-semibold hover:bg-gray-800 transition-colors">

                Continue

            </button>

        </div>

    </div>

</div>


<th:block th:if="${successMessage}">

    <script th:inline="javascript">

        window.onload = function () {

        showAlert(/*[[${successMessage}]]*/ 'Action completed successfully');

        };

    </script>

</th:block>


<div class="w-full max-w-[440px]">


    <div class="text-center mb-8">

        <div class="inline-flex items-center justify-center w-16 h-16 bg-slate-900 text-white rounded-3xl mb-4 shadow-2xl shadow-indigo-200">

            <i class="fa-solid fa-shield-halved text-2xl"></i>

        </div>

        <h1 class="text-3xl font-black text-slate-900 tracking-tight">Meenakshi PG</h1>

        <p class="text-slate-500 text-sm font-medium mt-2">Management & Resident Portal</p>

    </div>


    <div class="glass-effect rounded-[2.5rem] p-8 md:p-10 shadow-2xl shadow-indigo-100 border border-white">


        <form th:action="@{/login}" method="POST" class="space-y-6">


            <div class="group">

                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block ml-1">Registered

                    Email</label>

                <div class="relative flex items-center">

                    <i class="fa-solid fa-envelope absolute left-4 text-slate-400 group-focus-within:text-blue-500 transition-colors"></i>

                    <input type="email" name="email" required

                           placeholder="name@example.com"

                           class="w-full pl-11 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all font-bold text-slate-700 placeholder:font-normal">

                </div>

            </div>


            <div class="group">

                <div class="flex justify-between items-center mb-2 px-1">

                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Password</label>

                    <a href="javascript:void(0)" onclick="handleForgotPassword()"

                       class="text-[10px] font-bold text-blue-600 hover:text-indigo-600 transition-colors uppercase tracking-widest">Forgot?</a>


                </div>

                <div class="relative flex items-center">

                    <i class="fa-solid fa-lock absolute left-4 text-slate-400 group-focus-within:text-blue-500 transition-colors"></i>

                    <input type="password" id="passwordField" name="password" required

                           placeholder="••••••••"

                           class="w-full pl-11 pr-12 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all font-bold text-slate-700">


                    <button type="button" onclick="togglePassword()"

                            class="absolute right-4 text-slate-400 hover:text-slate-600 transition-colors p-1">

                        <i id="toggleIcon" class="fa-solid fa-eye text-sm"></i>

                    </button>

                </div>

            </div>


            <button type="submit"

                    class="w-full py-5 bg-slate-900 text-white rounded-[2rem] font-bold hover:bg-blue-600 transition-all shadow-xl shadow-slate-200 active:scale-[0.98] flex items-center justify-center gap-2">

                SIGN IN <i class="fa-solid fa-arrow-right-to-bracket text-xs ml-1"></i>

            </button>

        </form>


        <div class="mt-8 pt-8 border-t border-slate-100 text-center">

            <p class="text-xs text-slate-400 font-medium">

                New resident? <a href="/all-contacts" class="text-blue-600 font-bold hover:underline">Contact
                Manager</a>

            </p>

        </div>

    </div>


    <p class="text-center mt-8 text-[10px] font-bold text-slate-300 uppercase tracking-[0.4em]">

        Secure Access • v2.0

    </p>

</div>

<form id="forgotForm" th:action="@{/auth/forgot-password}" method="POST" class="hidden">

    <input type="hidden" name="email" id="forgotEmailHidden">

</form>

<!--<div th:if="${param.accessDenied}" class="bg-amber-50 text-amber-600 p-4 rounded-2xl text-xs font-bold mb-6 text-center border border-amber-100">-->

<!-- Access Denied! You do not have permission to view that page. 🛡️-->

<!--</div>-->

<script>

    function togglePassword() {

    const passwordField = document.getElementById('passwordField');

    const icon = document.getElementById('toggleIcon');



    if (passwordField.type === 'password') {

    passwordField.type = 'text';

    icon.classList.remove('fa-eye');

    icon.classList.add('fa-eye-slash');

    } else {

    passwordField.type = 'password';

    icon.classList.remove('fa-eye-slash');

    icon.classList.add('fa-eye');

    }

    }



    function showAlert(msg) {

    document.getElementById('alertMessageText').innerText = msg;

    const modal = document.getElementById('alertModal');

    const content = document.getElementById('modalContent');

    modal.classList.remove('hidden');

    setTimeout(() => {

    content.classList.remove('scale-95', 'opacity-0');

    content.classList.add('scale-100', 'opacity-100');

    }, 10);

    }



    function closeAlert() {

    const content = document.getElementById('modalContent');

    content.classList.add('scale-95', 'opacity-0');

    setTimeout(() => {

    document.getElementById('alertModal').classList.add('hidden');

    }, 200);

    }

    // Inside showAlert(message)

    const iconBox = modal.querySelector('.bg-green-100');

    const icon = modal.querySelector('.fa-check');



    if (message.includes('❌') || message.includes('Invalid')) {

    iconBox.classList.replace('bg-green-100', 'bg-red-100');

    icon.classList.replace('text-green-600', 'text-red-600');

    icon.classList.replace('fa-check', 'fa-exclamation-triangle');

    }



    function handleForgotPassword() {

    const emailInput = document.querySelector('input[name="email"]');

    if (!emailInput.value || !emailInput.checkValidity()) {

    showAlert("Please enter your registered email first! 📧");

    return;

    }



    // Populate hidden form and submit

    document.getElementById('forgotEmailHidden').value = emailInput.value;

    document.getElementById('forgotForm').submit();

    }


</script>

</body>

</html>
